name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    # apple-fm-sdk compiles C bindings against the macOS 26 Foundation Models
    # framework, so it can't be installed on any hosted runner. CI therefore
    # lints, runs the SDK-free unit tests (schema parsing), and builds the
    # package. The CLI/model tests self-skip without the SDK; full end-to-end
    # coverage needs a macOS 26 (M1+) self-hosted runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Lint
        run: uvx ruff check .

      - name: Unit tests (SDK-free; CLI/model tests self-skip)
        run: uv run --no-project --isolated --with pytest pytest tests -v
        env:
          PYTHONPATH: src

      - name: Build package
        run: uv build
