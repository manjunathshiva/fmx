name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    # macOS runner so apple-fm-sdk can install. Note: GitHub-hosted runners are not
    # macOS 26 with Apple Intelligence, so model-dependent tests self-skip; the
    # SDK-free schema tests + lint + build still run. Full model tests need a
    # macOS 26 (M1+) self-hosted runner.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v

      - name: Build package
        run: uv build
