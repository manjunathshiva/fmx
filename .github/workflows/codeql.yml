name: CodeQL

# Static-analysis security scanning for the fmx Python sources. fmx is pure
# Python (the on-device inference lives in apple-fm-sdk, which can't be built
# off-device anyway), so CodeQL runs in build-mode "none" and needs no compiler.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sunday so CVE catalogs get refreshed against the codebase
    - cron: "23 3 * * 0"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
